# ============================================================
#  参考配置文件（application-example.yml）
#  使用前请复制本文件为 application.yml，并替换下方标注 <...> 的占位符
#  命令示例：cp application-example.yml application.yml
# ============================================================

server:
  port: 8081

spring:
  # 配置数据源
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://<your_mysql_host>:3306/<your_database>?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: <your_db_username>
    password: <your_db_password>
    type: com.alibaba.druid.pool.DruidDataSource # 配置连接池

  # Redis服务连接配置
  data:
    redis:
      database: 1
      host: 127.0.0.1
      port: 6379
      password:                # 若 Redis 设有密码，在此填写

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB     # 设置最大上传文件大小为100MB
      max-request-size: 100MB  # 设置最大请求大小为100MB

  # 对于注解的Redis缓存数据统一设置有效期为10分钟，单位毫秒
  cache:
    redis:
      time-to-live: 600000

  # 配置邮件服务（使用 QQ 邮箱时按如下配置，其他邮箱请自行调整 host）
  mail:
    host: smtp.qq.com
    username: <your_email@qq.com>
    password: <your_smtp_auth_code>   # QQ邮箱需开启 SMTP 并生成授权码
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
      timeout: 10s              # 异步任务10秒超时

  mvc:
    async:
      request-timeout: 10000   # 接口请求10秒超时

# 配置 mybatis-plus
mybatis-plus:
  type-aliases-package: cn.edu.seig.pojo
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      table-prefix: tb_

# 定义角色和路径权限的映射关系
role-path-permissions:
  permissions:
    ROLE_ADMIN:
      - "/admin/**"
    ROLE_USER:
      - "/user/**"
      - "/popsci/apply/** "
    ROLE_POPSCI_USER:
      - "/user/**"
      - "/popsci/**"

# springdoc-openapi 项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: cn.edu.seig.MhWeb.controller

# MinIO 对象存储配置
minio:
  endpoint: http://<your_minio_host>:9000
  accessKey: <your_minio_access_key>
  secretKey: <your_minio_secret_key>
  bucket: mushroom

# 火山引擎 Ark 大模型配置
volc:
  ark:
    api-key: <your_volc_api_key>
    base-url: https://ark.cn-beijing.volces.com/api/v3
    model: <your_model_endpoint_id>

# AI 蘑菇识别配置
ai:
  mushroom:
    python-path: <your_python_executable_path>          # 例：/usr/bin/python3 或 C:\Anaconda3\envs\mushroom\python.exe
    script-path: <your_project_path>/mushroom_predict.py
    toxicity-model-path: <your_project_path>/mushroom_model_efficientnet.onnx
    species-model-path: <your_project_path>/toxic_species_model.onnx
    confidence-threshold: 0.7
